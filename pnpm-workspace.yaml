packages:
  # all packages in subdirs of packages/ and components/
  - 'packages/**'
  # all packages in subdirs of apps/
  - 'apps/**'
  # exclude packages that are inside test directories
  - '!**/test/**'
  # exclude packages that are inside node_modules
  - '!**/node_modules/**'
  # exclude build output from `dappql pack` — it's a standalone publishable
  # package, not a workspace member
  - '!**/dappql-package/**'
